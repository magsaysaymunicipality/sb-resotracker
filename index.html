<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<header>
  <nav>
    <div class="menu-controls">
      <img src="images/logo2.jpg" alt="Logo" class="logo">
      <span class="tagline">Digitizing Governance for Better Service</span>
    </div>
  </nav>
</header>

<main>
<section id="directory-section" class="dashboard-section">
  <h2 class="section-title">📜 LEGISLATIVE INFORMATION SYSTEM ⚖️</h2> 

  <!-- 🔎 Search bar --> 
  <div class="directory-search">
    <input type="text" id="searchInput" placeholder="🔎 Search documents...">
    <button class="clear-btn" type="button">Clear</button> 
  </div> 

  <!-- Cards grid -->
  <div id="cardsGrid" class="cards-grid"></div>
</section>

<!-- Modal -->
<div id="infoModal" class="modal">
  <div class="modal-content">
    <!-- Close button sa kanan -->
    <span class="close">&times;</span>

    <!-- Metadata block -->
    <div id="modalMeta" class="modal-meta">
      <h2 id="modalTitle"></h2>
      <p><strong>Reference #:</strong> <span id="modalRef"></span></p>
      <p><strong>Author:</strong> <span id="modalAuthor"></span></p>
      <p><strong>Date Adopted:</strong> <span id="modalDate"></span></p>
      <p><strong>Status:</strong> <span id="modalStatus"></span></p>
    </div>

    <!-- PDF Preview block -->
    <div id="modalPdf" class="modal-pdf">
      <div id="modalPreview"><!-- PDF.js will inject canvas here --></div>
    </div>

    <!-- Fallback link nasa labas ng PDF preview -->
    <p class="preview-link">
      <a id="pdfLink" href="#" target="_blank">Open full document</a>
    </p>
  </div>
</div>

</main>

<footer>
  <p>&copy; 2026 Municipality of Magsaysay. All rights reserved.</p>
</footer>

<!-- Scroll top button -->
<button class="scroll-top">Top</button>

<!-- === PDF.js Setup & Lazy Loading === -->
<script type="module">
  import * as pdfjsLib from './js/pdf.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = './js/pdf.worker.mjs';
  window.pdfjsLib = pdfjsLib;

  window.renderPDF = function(url) {
    const container = document.getElementById("modalPreview");
    container.innerHTML = "";

    pdfjsLib.getDocument({ url }).promise.then(pdf => {
      let currentPage = 1;

      // render first page agad
      renderPage(pdf, currentPage, container);
      currentPage++;

      // IntersectionObserver para lazy load
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting && currentPage <= pdf.numPages) {
            renderPage(pdf, currentPage, container);
            currentPage++;
          }
        });
      }, { root: container, threshold: 0.1 });

      function renderPage(pdf, pageNum, container) {
        pdf.getPage(pageNum).then(page => {
          const viewport = page.getViewport({ scale: 0.8 });
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          container.appendChild(canvas);

          page.render({ canvasContext: ctx, viewport });
          observer.observe(canvas);
        });
      }
    }).catch(err => {
      container.innerHTML = `<p class="no-preview">Cannot preview PDF: ${err.message}</p>`;
    });
  };
</script>

<!-- === Main App Logic === -->
<script type="module" src="./js/directory.js"></script>
</body>
</html>
